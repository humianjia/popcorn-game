    <script>
        function getURLParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const categoryDataMap = {
            'all': [...(window.gamesData || []), ...(window.actionGames || []), ...(window.battleRoyaleData || []), ...(window.fpsData || []), ...(window.multiplayerGames || []), ...(window.sniperData || [])],
            'fps': window.fpsData || [],
            'battle-royale': window.battleRoyaleData || [],
            'sniper': window.sniperData || [],
            'multiplayer': window.multiplayerGames || [],
            'action': window.actionGames || []
        };

        const categoryTitles = {
            'all': 'All Games',
            'fps': 'FPS Shooter Games',
            'battle-royale': 'Battle Royale Games',
            'sniper': 'Sniper Games',
            'multiplayer': 'Multiplayer Games',
            'action': 'Action Games'
        };

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function loadGamesByCategory() {
            const container = document.getElementById('games-list-container');
            const titleElement = document.getElementById('games-section-title');
            const countElement = document.getElementById('games-count');
            if (!container || !titleElement) return;

            const category = getURLParam('category') || 'all';
            const games = categoryDataMap[category] || [];

            titleElement.innerHTML = '<i class="fas fa-th-large"></i> ' + (categoryTitles[category] || 'All Games');
            if (countElement) countElement.textContent = games.length + ' games';

            container.innerHTML = '';
            const gamesToShow = shuffleArray(games).slice(0, 28);

            gamesToShow.forEach((game) => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = '<div class="game-card-img"><img src="' + game.imageUrl + '" alt="' + game.name + '" onerror="this.src=\'img/icon/popcornGame.jpg\'"></div><div class="game-card-title">' + game.name + '</div>';
                card.addEventListener('click', function() {
                    if (game.link) window.location.href = game.link;
                });
                container.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', loadGamesByCategory);
    </script>
